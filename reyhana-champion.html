<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reyhana Champion ⭐</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;700&family=Nunito:wght@400;700&family=Lilita+One&family=Poppins:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    body { font-family: 'Nunito', system-ui, sans-serif; }
    .font-baloo { font-family: 'Baloo 2', sans-serif; }
    .font-lilita { font-family: 'Lilita One', cursive; }
    @keyframes pop { 0%{transform:scale(0.8);opacity:0} 100%{transform:scale(1);opacity:1} }
    .pop { animation: pop 0.25s ease-out; }
  </style>
</head>
<body class="bg-slate-50">
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect } = React;

const QB = {
  math: [
    { q: "What is 458 + 322?", a: "780", lv: 1 },
    { q: "What is 1000 - 455?", a: "545", lv: 1 },
    { q: "What is 7 x 4?", a: "28", lv: 1 },
    { q: "Value of digit 5 in 5,432?", a: "5000", lv: 1 },
    { q: "Divide 72 by 8.", a: "9", lv: 2 },
    { q: "What is 123 x 3?", a: "369", lv: 2 },
    { q: "4000 + 500 + 20 + 9 = ?", a: "4529", lv: 2 },
    { q: "Which is greater: 1/2 or 1/4?", a: "1/2", lv: 2 }
  ],
  science: [
    { q: "Do fungi make their own food?", a: "No", lv: 1 },
    { q: "Which part of the plant holds it upright?", a: "Stem", lv: 1 },
    { q: "Is a car a living thing?", a: "No", lv: 1 },
    { q: "What do plants need for food? (Sunlight, Water, and...)", a: "Carbon Dioxide", lv: 2 },
    { q: "Which part of the plant absorbs water?", a: "Roots", lv: 2 },
    { q: "Is a mushroom a plant or fungi?", a: "Fungi", lv: 2 }
  ],
  malay: [
    { q: "Translate 'Book'", a: "Buku", lv: 1 },
    { q: "Translate 'Red'", a: "Merah", lv: 1 },
    { q: "Meaning of 'Saya suka makan'?", a: "I like to eat", lv: 1 },
    { q: "Lawan kata bagi 'Besar'?", a: "Kecil", lv: 2 },
    { q: "Lawan kata bagi 'Tinggi'?", a: "Rendah", lv: 2 },
    { q: "Ejaan yang betul: Ber_lari (Running)", a: "Berlari", lv: 2 }
  ]
};

function App() {
  const [view, setView] = useState('home');
  const [subject, setSubject] = useState(null);
  const [level, setLevel] = useState(1);
  const [currentQ, setCurrentQ] = useState(0);
  const [score, setScore] = useState(0);

  const startPractice = (sub) => {
    setSubject(sub);
    setView('quiz');
    setCurrentQ(0);
    setScore(0);
  };

  const handleAnswer = (isCorrect) => {
    const newScore = isCorrect ? score + 1 : score;
    const nextQ = currentQ + 1;
    const filteredQB = QB[subject].filter(q => q.lv <= level);

    if (nextQ < filteredQB.length) {
      setScore(newScore);
      setCurrentQ(nextQ);
    } else {
      if (newScore === filteredQB.length && level < 2) {
        setLevel(2);
        alert("⭐ Perfect Score! Level 2 unlocked!");
      }
      setView('results');
    }
  };

  if (view === 'home') {
    return (
      <div className="p-10 text-center">
        <h1 className="text-4xl font-lilita text-blue-600 mb-8">Reyhana's Practice Zone ⭐</h1>
        <div className="grid grid-cols-1 gap-4 max-w-sm mx-auto">
          {Object.keys(QB).map(s => (
            <button key={s} onClick={() => startPractice(s)} className="bg-white p-6 rounded-2xl shadow-lg text-xl font-bold capitalize hover:scale-105 transition-transform">
              {s} Practice
            </button>
          ))}
        </div>
      </div>
    );
  }

  return (
    <div className="p-6 max-w-lg mx-auto">
      <button onClick={() => setView('home')} className="mb-4 bg-gray-200 px-4 py-2 rounded-lg font-bold">🏠 Back to Home</button>
      {view === 'quiz' && (
        <div className="bg-white p-8 rounded-3xl shadow-xl pop">
          <p className="text-sm text-gray-500 mb-2">Level {level} - Question {currentQ + 1}</p>
          <h2 className="text-2xl font-bold mb-6">{QB[subject].filter(q => q.lv <= level)[currentQ].q}</h2>
          <input id="ansInput" type="text" className="w-full border-2 p-3 rounded-xl mb-4" placeholder="Your answer..." />
          <button onClick={() => {
            const input = document.getElementById('ansInput');
            handleAnswer(input.value.toLowerCase() === QB[subject].filter(q => q.lv <= level)[currentQ].a.toLowerCase());
            input.value = '';
          }} className="w-full bg-blue-500 text-white p-4 rounded-xl font-bold">Submit</button>
        </div>
      )}
      {view === 'results' && (
        <div className="text-center bg-white p-10 rounded-3xl shadow-xl">
          <h2 className="text-3xl font-bold mb-4">Practice Finished!</h2>
          <p className="text-xl mb-6">Your Score: {score}</p>
          <button onClick={() => setView('home')} className="bg-blue-600 text-white px-8 py-3 rounded-xl font-bold">Try Another Subject</button>
        </div>
      )}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reyhana Champion ⭐</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;700&family=Nunito:wght@400;700&family=Lilita+One&display=swap" rel="stylesheet" />
  <style>
    body { font-family: 'Nunito', sans-serif; }
    .font-lilita { font-family: 'Lilita One', cursive; }
    .card-hover:hover { transform: translateY(-5px); transition: all 0.3s ease; }
  </style>
</head>
<body class="bg-gradient-to-b from-blue-50 to-white min-h-screen">
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    function App() {
      const subjects = [
        { id: 'math', name: 'Mathematics', icon: '🔢', color: 'bg-orange-400' },
        { id: 'science', name: 'Science', icon: '🧪', color: 'bg-green-500' },
        { id: 'malay', name: 'Bahasa Melayu', icon: '🌙', color: 'bg-red-500' },
        { id: 'english', name: 'English', icon: '📚', color: 'bg-blue-500' }
      ];

      return (
        <div className="max-w-md mx-auto pt-12 px-6">
          <header className="text-center mb-12">
            <h1 className="text-5xl font-lilita text-blue-600 drop-shadow-sm mb-2">Hello, Reyhana!</h1>
            <p className="text-gray-500 font-semibold text-lg">Ready to be a champion today? 🏆</p>
          </header>

          <div className="grid grid-cols-1 gap-6">
            {subjects.map((sub) => (
              <a 
                key={sub.id}
                href={`./reyhana-champion.html?subject=${sub.id}`}
                className={`${sub.color} card-hover p-6 rounded-3xl shadow-xl flex items-center gap-6 text-white no-underline`}
              >
                <span className="text-4xl bg-white/20 p-4 rounded-2xl">{sub.icon}</span>
                <div>
                  <h2 className="text-2xl font-bold">{sub.name}</h2>
                  <p className="text-white/80 text-sm font-medium">Click to Start Practice</p>
                </div>
              </a>
            ))}
          </div>

          <footer className="mt-16 text-center text-gray-400 text-sm font-medium pb-8">
            Made with ❤️ for the world's best student!
          </footer>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>

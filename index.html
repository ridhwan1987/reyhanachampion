function shuffle(arr) { return [...arr].sort(() => Math.random() - 0.5); }

function generateQuiz(subject, n = 10) {
  return shuffle(QB[subject]).slice(0, Math.min(n, QB[subject].length)).map(q => ({
    ...q, shuffledOpts: q.opts ? shuffle(q.opts) : []
  }));
}

function saveResult(subject, mode, score, total, breakdown, difficulty) {
  const all = JSON.parse(localStorage.getItem(RC_PREFIX + 'results') || '[]');
  all.push({
    iso: new Date().toISOString(),
    date: new Date().toLocaleDateString('en-SG', { day:'numeric', month:'short' }),
    subject, mode, score, total,
    pct: Math.round((score / total) * 100),
    breakdown,
    difficulty: difficulty || 'unknown'
  });
  localStorage.setItem(RC_PREFIX + 'results', JSON.stringify(all));
}

function getResults() { return JSON.parse(localStorage.getItem(RC_PREFIX + 'results') || '[]'); }

// Track drill attempts per subject (how many drill runs before first perfect)
function getDrillAttempts() {
  return JSON.parse(localStorage.getItem(RC_PREFIX + 'drillAttempts') || '{}');
}
function recordDrillAttempt(subject, topic, perfect) {
  const da = getDrillAttempts();
  const key = subject + '|' + topic;
  if (!da[key]) da[key] = { attempts: 0, achieved: false };
  if (!da[key].achieved) {
    da[key].attempts++;
    if (perfect) da[key].achieved = true;
  }
  localStorage.setItem(RC_PREFIX + 'drillAttempts', JSON.stringify(da));
}
function drillAttemptsForSubject(subject) {
  const da = getDrillAttempts();
  const relevant = Object.entries(da).filter(([k]) => k.startsWith(subject + '|'));
  if (!relevant.length) return null;
  const total = relevant.reduce((sum, [, v]) => sum + v.attempts, 0);
  const achieved = relevant.filter(([, v]) => v.achieved).length;
  return { totalAttempts: total, topicsAchieved: achieved, topicsTotal: relevant.length };
}

function subjectStats(sub) {
  const rs = getResults().filter(r => r.subject === sub);
  if (!rs.length) return null;
  const avg = Math.round(rs.reduce((a,b) => a + b.pct, 0) / rs.length);
  const best = Math.max(...rs.map(r => r.pct));
  const quizRs = rs.filter(r => r.mode === 'quiz');
  const drillRs = rs.filter(r => r.mode === 'drill');
  const quizAvg = quizRs.length ? Math.round(quizRs.reduce((a,b) => a + b.pct, 0) / quizRs.length) : null;
  const drillAvg = drillRs.length ? Math.round(drillRs.reduce((a,b) => a + b.pct, 0) / drillRs.length) : null;
  const perfectDrills = rs.filter(r => r.mode === 'drill' && r.pct === 100).length;
  const count = rs.length;
  const drillAttemptData = drillAttemptsForSubject(sub);
  return { avg, best, count, perfectDrills, quizAvg, drillAvg, drillAttemptData };
}

function getWallet() {
  const wallet = JSON.parse(localStorage.getItem(RC_PREFIX + 'wallet') || '{"earned":0,"paid":0}');
  return wallet;
}

function addReward(subject, topic) {
  const wallet = getWallet();
  wallet.earned += 2;
  localStorage.setItem(RC_PREFIX + 'wallet', JSON.stringify(wallet));
  const rewards = JSON.parse(localStorage.getItem(RC_PREFIX + 'rewards') || '[]');
  rewards.push({ iso: new Date().toISOString(), date: new Date().toLocaleDateString('en-SG'), subject, topic, amount: 2 });
  localStorage.setItem(RC_PREFIX + 'rewards', JSON.stringify(rewards));
}

// FIREBASE CLOUD SYNC
// ═══════════════════════════════════════════════════════════════
function getFirebaseUrl() {
  return (localStorage.getItem(RC_PREFIX + 'firebase_url') || '').trim();
}
async function syncToFirebase() {
  const url = getFirebaseUrl();
  if (!url) return;
  try {
    await fetch(url.replace(/\/$/, '') + '/rc_data.json', {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        results: getResults(),
        wallet: getWallet(),
        rewards: JSON.parse(localStorage.getItem(RC_PREFIX + 'rewards') || '[]')
      })
    });
  } catch(e) { console.warn('Firebase sync failed', e); }
}
async function loadFromFirebase() {
  const url = getFirebaseUrl();
  if (!url) return false;
  try {
    const res = await fetch(url.replace(/\/$/, '') + '/rc_data.json');
    const data = await res.json();
    if (!data) return false;
    if (data.results) localStorage.setItem(RC_PREFIX + 'results', JSON.stringify(data.results));
    if (data.wallet)  localStorage.setItem(RC_PREFIX + 'wallet',  JSON.stringify(data.wallet));
    if (data.rewards) localStorage.setItem(RC_PREFIX + 'rewards', JSON.stringify(data.rewards));
    return true;
  } catch(e) { console.warn('Firebase load failed', e); return false; }
}

          width:`${p.size}px`, height:`${p.size}px`,

}

            className="w-full bg-white border-2 border-gray-200 text-gray-500 font-semibold py-3 rounded-2xl text-sm hover:bg-gray-50 transition-all">
            🏠 Return to Home
          </button>
        )}
      </div>
    </div>
  );
}

function QuizScreen({ subject, onDone, onBack, difficulty, malayHintCountRef }) {
  // For Malay reveal-English tracking
  const localMalayHintCount = useRef(0);
  const hintRef = malayHintCountRef || localMalayHintCount;

  const TEACH_BANKS = { math: MATH_TEACH, english: ENGLISH_TEACH, science: SCIENCE_TEACH, gepmath: GEPMATH_TEACH, malay: MALAY_TEACH };

  // Filter by difficulty: if difficulty set, prefer matching questions; untagged questions count as 'easy'
  function filterDiff(qs) {
    if (!difficulty || difficulty === 'easy') return qs.filter(q => !q.difficulty || q.difficulty === 'easy');
    if (difficulty === 'medium') return qs.filter(q => !q.difficulty || q.difficulty === 'easy' || q.difficulty === 'medium');
    return qs;
  }

  const [questions] = useState(() => {
    function pickNoRepeat(pool, n, key) {
      let seen = JSON.parse(localStorage.getItem(key)||'[]');
      let avail = pool.filter(q=>!seen.includes(q.id));
      if(avail.length < n){ seen=[]; avail=pool; localStorage.setItem(key,'[]'); }
      const picked = shuffle(avail).slice(0,n);
      localStorage.setItem(key, JSON.stringify([...seen,...picked.map(q=>q.id)]));
      return picked;
    }
    const dk = difficulty||'easy';
    if (subject === 'gepmath') {
      const topicOrder = ['Number Patterns','Clever Problem Sums','Logic & Spatial','Mental Maths','Fractions & Measurement'];
      const result = [];
      topicOrder.forEach(tp => {
        const tqs = QB.gepmath.filter(q => q.topic === tp);
        const filtered = difficulty && difficulty !== 'easy'
          ? tqs.filter(q => q.diff === (difficulty === 'hard' ? 3 : 2))
          : tqs.filter(q => !q.diff || q.diff === 1);
        const pool = filtered.length >= 16 ? filtered : tqs;
        const key = `af1_seen_gepmath_${dk}_${tp.replace(/\W+/g,'_')}`;
        pickNoRepeat(pool, 8, key).forEach(q => result.push({ ...q, shuffledOpts: q.opts ? shuffle(q.opts) : [] }));
      });
      return result;
    }
    if (subject === 'math') {
      const sectionOrder = ['Section A: MCQ', 'Section B: Short Answer', 'Section C: Word Problems'];
      const mathN = {'Section A: MCQ':14,'Section B: Short Answer':14,'Section C: Word Problems':12};
      const result = [];
      sectionOrder.forEach(sec => {
        const secQs = QB.math.filter(q => q.section === sec);
        const filtered = filterDiff(secQs);
        const pool = filtered.length >= 3 ? filtered : secQs.filter(q => !q.difficulty || q.difficulty === 'easy');
        const key = `af1_seen_math_${dk}_${sec.replace(/\W+/g,'_')}`;
        pickNoRepeat(pool, mathN[sec], key).forEach(q => result.push({ ...q, shuffledOpts: q.opts ? shuffle(q.opts) : [] }));
      });
      return result;
    }
    if (subject === 'english') {
      const sectionOrder = ['Grammar MCQ','Vocabulary','Visual Text','Grammar Cloze','Editing','Comprehension'];
      const result = [];
      sectionOrder.forEach(sec => {
        const sqs = QB.english.filter(q => q.section === sec);
        const filtered = filterDiff(sqs);
        const pool = filtered.length >= 2 ? filtered : sqs.filter(q => !q.difficulty || q.difficulty === 'easy');
        const key = `af1_seen_english_${dk}_${sec.replace(/\W+/g,'_')}`;
        pickNoRepeat(pool, 7, key).forEach(q => result.push({ ...q, shuffledOpts: q.opts ? shuffle(q.opts) : [] }));
      });
      return result.length ? result : generateQuiz(subject, 40);
    }
    if (subject === 'science') {
      const topicOrder = ['Diversity of Living Things','Materials','Magnets','Life Cycles','Mixed Review'];
      const result = [];
      topicOrder.forEach(tp => {
        const tqs = QB.science.filter(q => (q.topic || q.section) === tp);
        const filtered = filterDiff(tqs);
        const pool = filtered.length >= 2 ? filtered : tqs.filter(q => !q.difficulty || q.difficulty === 'easy');
        const key = `af1_seen_science_${dk}_${tp.replace(/\W+/g,'_')}`;
        pickNoRepeat(pool, 8, key).forEach(q => result.push({ ...q, shuffledOpts: q.opts ? shuffle(q.opts) : [] }));
      });
      return result.length ? result : generateQuiz(subject, 40);
    }
    if (subject === 'malay') {
      const topicOrder = ['Perbendaharaan Kata','Tatabahasa','Pemahaman','Isi Tempat Kosong'];
      const result = [];
      topicOrder.forEach(tp => {
        const tqs = QB.malay.filter(q => (q.topic || q.section) === tp);
        const filtered = filterDiff(tqs);
        const pool = filtered.length >= 2 ? filtered : tqs.filter(q => !q.difficulty || q.difficulty === 'easy');
        const key = `af1_seen_malay_${dk}_${tp.replace(/\W+/g,'_')}`;
        pickNoRepeat(pool, 10, key).forEach(q => result.push({ ...q, shuffledOpts: q.opts ? shuffle(q.opts) : [] }));
      });
      return result.length ? result : generateQuiz(subject, 40);
    }
    return generateQuiz(subject, 40);
  });

  const [idx, setIdx] = useState(0);
  const [selected, setSel] = useState(null);
  const [showHint, setShowHint] = useState(false);
  const [showMalayEng, setShowMalayEng] = useState(false);
  const answersRef = useRef([]);
  const [inputVal, setInputVal] = useState('');
  const taughtSections = useRef(new Set());

  // Determine first section/topic key
  const firstKey = questions[0]?.section || questions[0]?.topic;
  const teachBank = TEACH_BANKS[subject];
  const [showTeachFor, setShowTeachFor] = useState(() => {
    if (firstKey && teachBank && teachBank[firstKey]) return firstKey;
    return null;
  });
  const cfg = CFG[subject];
  const q = questions[idx];

  function dismissTeach() {
    taughtSections.current.add(showTeachFor);
    setShowTeachFor(null);
  }

  function pick(opt) {
    if (selected !== null) return;
    setSel(opt);
    answersRef.current = [...answersRef.current, { q, chosen: opt, correct: opt === q.ans || (typeof q.ans === 'number' && q.opts[q.ans] === opt) }];
  }

  function checkTextAnswer() {
    if (!inputVal.trim() || selected !== null) return;
    const userVal = inputVal.trim().toLowerCase().replace(/\s/g, '');
    const ansVal = String(q.ans).toLowerCase().replace(/\s/g, '');
    const correct = userVal === ansVal;
    setSel(inputVal.trim());
    answersRef.current = [...answersRef.current, { q, chosen: inputVal.trim(), correct }];
  }

  function next() {
    if (idx + 1 >= questions.length) {
      const allA = answersRef.current;
      const score = allA.filter(a => a.correct).length;
      const bd = {};
      allA.forEach(a => {
        const section = a.q.section || a.q.topic || 'General';
        if (!bd[section]) bd[section] = { correct:0, total:0 };
        bd[section].total++;
        if (a.correct) bd[section].correct++;
      });
      onDone(score, questions.length, bd, hintRef.current);
    } else {
      const nextQ = questions[idx + 1];
      const nextKey = nextQ?.section || nextQ?.topic;
      setIdx(i => i + 1);
      setSel(null);
      setShowHint(false);
      setShowMalayEng(false);
      setInputVal('');
      if (nextKey && teachBank && teachBank[nextKey] && !taughtSections.current.has(nextKey)) {
        setShowTeachFor(nextKey);
      }
    }
  }

  // Show teach panel if needed
  if (showTeachFor) {
    if (subject === 'math') {
      return <MathTeachPanel section={showTeachFor} cfg={cfg} onDone={dismissTeach} onHome={onBack} />;
    }
    return <SubjectTeachPanel section={showTeachFor} subject={subject} onDone={dismissTeach} onHome={onBack} />;
  }

  const pct = (idx / questions.length) * 100;
  const isCorrect = q.opts
    ? (selected === q.ans || (typeof q.ans === 'number' && q.opts[q.ans] === selected))
    : (selected !== null && selected.toLowerCase() === String(q.ans).toLowerCase());

  // Display label for text answers (e.g. "$ 26.40" or "7 cm")
  const answerDisplay = q.unitPre ? `${q.unitPre}${q.ans}` : q.unit ? `${q.ans} ${q.unit}` : q.ans;

  return (
    <div className="min-h-screen flex flex-col" style={{ backgroundColor: cfg.bg }}>
      <div className="p-4 flex items-center gap-3" style={{ backgroundColor: cfg.hdr, color: 'white' }}>
        <button onClick={onBack} className="text-white/70 hover:text-white text-xl" title="Return to Home">🏠</button>
        <div className="flex-1">
          <div className="flex justify-between text-xs mb-1.5 text-white/80">
            <span>{cfg.emoji} {cfg.label}{difficulty && difficulty !== 'easy' ? ` · ${difficulty === 'medium' ? '🟡' : '🔴'} ${difficulty.charAt(0).toUpperCase() + difficulty.slice(1)}` : ''}</span>
            <span>Q{idx+1}/{questions.length}</span>
          </div>
          <div className="w-full bg-white/30 rounded-full h-2">
            <div className="bg-white h-2 rounded-full transition-all duration-500" style={{ width:`${pct}%` }} />
          </div>
        </div>
      </div>

      <div className="flex-1 p-5 flex flex-col gap-4 max-w-lg mx-auto w-full pop">
        {q.section && (
          <div className="inline-flex items-center gap-1 text-xs font-semibold px-3 py-1 rounded-full w-fit" style={{ backgroundColor: cfg.sky + '20', color: cfg.hdr }}>
            {q.section || q.topic}
          </div>
        )}

        {q.passage && (
          <div className="bg-white rounded-2xl p-4 shadow-sm border-l-4" style={{ borderColor: cfg.hdr }}>
            <p className="text-xs text-gray-600 italic">{q.passage}</p>
          </div>
        )}

        <div className="bg-white rounded-2xl p-5 shadow-sm">
          <p className="text-base font-semibold text-gray-800 leading-relaxed">{q.q}</p>
        </div>

        <div className="flex flex-col gap-3">
          {q.opts && q.shuffledOpts.map((opt, i) => {
            let cls = 'bg-white border-2 border-gray-200 text-gray-700 hover:border-gray-400 cursor-pointer';
            if (selected !== null) {
              const answerOpt = q.ans !== undefined ? (typeof q.ans === 'number' ? q.opts[q.ans] : q.ans) : q.opts[0];
              if (opt === answerOpt) cls = 'bg-green-50 border-2 border-green-500 text-green-800';
              else if (opt === selected && opt !== answerOpt) cls = 'bg-red-50 border-2 border-red-400 text-red-700';
              else cls = 'bg-white border-2 border-gray-200 text-gray-400 opacity-50';
            }
            return (
              <button key={i} onClick={() => pick(opt)}
                className={`${cls} rounded-xl p-4 text-left font-medium transition-all text-sm`}>
                <span className="text-gray-400 mr-2 font-normal">{['A','B','C','D'][i]}.</span>{opt}
              </button>
            );
          })}

        {!q.opts && (
          <div className="flex flex-col gap-3">
            <div className="flex items-center gap-2">
              {q.unitPre && (
                <span className="flex-shrink-0 text-lg font-bold px-4 py-4 rounded-xl border-2 border-teal-200 bg-teal-50 text-teal-700">{q.unitPre}</span>
              )}
              <input
                type="text"
                value={inputVal}
                onChange={e => setInputVal(e.target.value)}
                onKeyDown={e => e.key === 'Enter' && selected === null && checkTextAnswer()}
                disabled={selected !== null}
                placeholder="Type number..."
                className="flex-1 border-2 border-gray-300 rounded-xl p-4 text-base focus:outline-none focus:border-teal-500 bg-white"
              />
              {q.unit && (
                <span className="flex-shrink-0 text-sm font-bold px-4 py-4 rounded-xl border-2 border-teal-200 bg-teal-50 text-teal-700">{q.unit}</span>
              )}
            </div>
            {selected === null && (
              <button onClick={checkTextAnswer}
                className="bg-teal-500 hover:bg-teal-600 text-white font-bold py-3 rounded-xl">
                Check ✓
              </button>
            )}
          </div>
        )}
        </div>

        {selected !== null && (
          <div className={`rounded-xl p-4 pop ${isCorrect ? 'bg-green-50 border border-green-200' : 'bg-red-50 border border-red-200'}`}>
            <p className="font-semibold mb-1 text-sm">
              {isCorrect ? '✅ Correct!' : `❌ Answer: ${answerDisplay}`}
            </p>
            {q.exp && <p className="text-xs text-gray-600" dangerouslySetInnerHTML={{ __html: q.exp }} />}
          </div>
        )}

        {selected === null && q.hint && (
          <button onClick={() => setShowHint(!showHint)} className="text-xs text-blue-600 hover:text-blue-700 font-semibold">
            {showHint ? '💡 Hide hint' : '💡 Show hint'}
          </button>
        )}
        {showHint && q.hint && (
          <div className="bg-blue-50 border border-blue-200 rounded-xl p-3">
            <p className="text-xs text-blue-800">{q.hint}</p>
          </div>
        )}

        {subject === 'malay' && q.eng && selected === null && (
          <button onClick={() => { if (!showMalayEng) hintRef.current++; setShowMalayEng(!showMalayEng); }}
            className="text-xs text-orange-500 hover:text-orange-600 font-semibold mt-1">
            {showMalayEng ? '🇬🇧 Hide English' : '🇬🇧 Reveal English'}
          </button>
        )}
        {showMalayEng && subject === 'malay' && q.eng && (
          <div className="bg-amber-50 border border-amber-200 rounded-xl p-3">
            <p className="text-xs text-amber-800">🇬🇧 {q.eng}</p>
          </div>
        )}

        {selected !== null && (
          <button onClick={next} className={`${cfg.btn} text-white font-bold py-3 rounded-xl transition-all pop`}>
            {idx + 1 >= questions.length ? 'See Results 🎉' : 'Next →'}
          </button>
        )}
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════
// SCREEN: DRILL MODE
// ═══════════════════════════════════════════════════════════════
function DrillScreen({ subject, topic, onDone, onBack, onHome }) {
  const [questions] = useState(() => {
    // Exclude quiz-only questions from drill
    const filtered = QB[subject].filter(q => (q.topic || q.section) === topic && (!q.pool || q.pool !== 'quiz'));
    return shuffle(filtered).slice(0, 10).map(q => ({
      ...q, shuffledOpts: q.opts ? shuffle(q.opts) : [], originalIdx: QB[subject].indexOf(q)
    }));
  });
  const [queue, setQueue] = useState([...Array(10).keys()]);
  const [idx, setIdx] = useState(0);
  const [selected, setSel] = useState(null);
  const [inputVal, setInputVal] = useState('');
  const cfg = CFG[subject];
  const qIdx = queue[idx];
  const q = questions[qIdx];

  function pick(opt) {
    if (selected !== null) return;
    setSel(opt);
    const isCorrect = opt === q.ans || (typeof q.ans === 'number' && q.opts[q.ans] === opt);

    if (!isCorrect) {
      // Move to back of queue if wrong
      const newQueue = [...queue.slice(1), qIdx];
      setQueue(newQueue);
      setIdx(0);
      setSel(null);
    }
  }

  function checkTextAnswer() {
    if (!inputVal.trim() || selected !== null) return;
    const userVal = inputVal.trim().toLowerCase().replace(/\s/g, '');
    const ansVal = String(q.ans).toLowerCase().replace(/\s/g, '');
    const correct = userVal === ansVal;
    setSel(inputVal.trim());

    if (!correct) {
      // Move to back of queue if wrong
      const newQueue = [...queue.slice(1), qIdx];
      setQueue(newQueue);
      setIdx(0);
      setSel(null);
    }
  }

  function next() {
    if (queue.length === 1 && selected !== null) {
      // Perfect! Last question answered correctly
      onDone(true);
    } else if (selected !== null && queue.length > 1) {
      setIdx(0);
      setSel(null);
      setInputVal('');
    } else if (queue.length === 0) {
      onDone(true);
    }
  }

  if (!q) return <div className="min-h-screen flex items-center justify-center text-gray-600">Loading...</div>;

  const pct = ((10 - queue.length) / 10) * 100;

  return (
    <div className="min-h-screen flex flex-col" style={{ backgroundColor: cfg.bg }}>
      <div className="p-4 flex items-center gap-3" style={{ backgroundColor: cfg.hdr, color: 'white' }}>
        <button onClick={onHome || onBack} className="text-white/70 hover:text-white text-xl" title="Return to Home">🏠</button>
        <div className="flex-1">
          <div className="flex justify-between text-xs mb-1.5 text-white/80">
            <span>{cfg.emoji} Drill: {topic}</span>
            <span>{10 - queue.length}/{10} correct</span>
          </div>
          <div className="w-full bg-white/30 rounded-full h-2">
            <div className="bg-white h-2 rounded-full transition-all duration-500" style={{ width:`${pct}%` }} />
          </div>
        </div>
      </div>

      <div className="flex-1 p-5 flex flex-col gap-4 max-w-lg mx-auto w-full pop">
        <div className="inline-flex items-center gap-1 text-xs font-semibold px-3 py-1 rounded-full w-fit" style={{ backgroundColor: cfg.sky + '20', color: cfg.hdr }}>
          {10 - queue.length}/10 Correct
        </div>

        <div className="bg-white rounded-2xl p-5 shadow-sm">
          <p className="text-base font-semibold text-gray-800 leading-relaxed">{q.q}</p>
        </div>

        <div className="flex flex-col gap-3">
          {q.opts && q.shuffledOpts.map((opt, i) => {
            let cls = 'bg-white border-2 border-gray-200 text-gray-700 hover:border-gray-400 cursor-pointer';
            if (selected !== null) {
              const answerOpt = q.ans !== undefined ? (typeof q.ans === 'number' ? q.opts[q.ans] : q.ans) : q.opts[0];
              if (opt === answerOpt) cls = 'bg-green-50 border-2 border-green-500 text-green-800';
              else if (opt === selected && opt !== answerOpt) cls = 'bg-red-50 border-2 border-red-400 text-red-700';
              else cls = 'bg-white border-2 border-gray-200 text-gray-400 opacity-50';
            }
            return (
              <button key={i} onClick={() => pick(opt)}
                className={`${cls} rounded-xl p-4 text-left font-medium transition-all text-sm`}>
                <span className="text-gray-400 mr-2 font-normal">{['A','B','C','D'][i]}.</span>{opt}
              </button>
            );
          })}

        {!q.opts && (
          <div className="flex flex-col gap-3">
            <div className="flex items-center gap-2">
              {q.unitPre && (
                <span className="flex-shrink-0 text-lg font-bold px-4 py-4 rounded-xl border-2 border-teal-200 bg-teal-50 text-teal-700">{q.unitPre}</span>
              )}
              <input
                type="text"
                value={inputVal}
                onChange={e => setInputVal(e.target.value)}
                onKeyDown={e => e.key === 'Enter' && selected === null && checkTextAnswer()}
                disabled={selected !== null}
                placeholder="Type number..."
                className="flex-1 border-2 border-gray-300 rounded-xl p-4 text-base focus:outline-none focus:border-teal-500 bg-white"
              />
              {q.unit && (
                <span className="flex-shrink-0 text-sm font-bold px-4 py-4 rounded-xl border-2 border-teal-200 bg-teal-50 text-teal-700">{q.unit}</span>
              )}
            </div>
            {selected === null && (
              <button onClick={checkTextAnswer}
                className="bg-teal-500 hover:bg-teal-600 text-white font-bold py-3 rounded-xl">
                Check ✓
              </button>
            )}
          </div>
        )}
        </div>

        {selected !== null && (() => {
          const drillAnsDisplay = q.unitPre ? `${q.unitPre}${q.ans}` : q.unit ? `${q.ans} ${q.unit}` : q.ans;
          const isRight = q.opts
            ? (selected === q.ans || (typeof q.ans === 'number' && q.opts[q.ans] === selected))
            : (selected.toLowerCase().replace(/\s/g,'') === String(q.ans).toLowerCase().replace(/\s/g,''));
          return (
            <div className={`rounded-xl p-4 pop ${isRight ? 'bg-green-50 border border-green-200' : 'bg-red-50 border border-red-200'}`}>
              <p className="font-semibold mb-1 text-sm">{isRight ? '✅ Correct!' : `❌ Answer: ${drillAnsDisplay}`}</p>
              {q.exp && <p className="text-xs text-gray-600" dangerouslySetInnerHTML={{ __html: q.exp }} />}
            </div>
          );
        })()}

        {selected !== null && (
          <button onClick={next} className={`${cfg.btn} text-white font-bold py-3 rounded-xl transition-all pop`}>
            {queue.length === 1 ? '✅ Next (Final)' : 'Continue →'}
          </button>
        )}
      </div>
    </div>
  );
}

// SCREEN: RESULTS
// ═══════════════════════════════════════════════════════════════
function ResultsScreen({ subject, score, total, breakdown, mode, revealCount, difficulty, onHome, onRetry }) {
  const cfg = CFG[subject];
  const pct = Math.round((score / total) * 100);
  const star = pct >= 90 ? '🏆' : pct >= 70 ? '🌟' : pct >= 50 ? '👍' : '💪';
  const msg = pct >= 90 ? 'Outstanding!' : pct >= 70 ? 'Great job!' : pct >= 50 ? 'Good effort!' : 'Keep going!';
  const isPerfect = pct === 100;
  const showConf = pct >= 70 || isPerfect;

  useEffect(() => {
    saveResult(subject, mode, score, total, breakdown, difficulty);
    if (isPerfect) {
      addReward(subject, mode);
    }
  }, []);

  return (
    <div className="min-h-screen flex flex-col items-center justify-center p-6" style={{ backgroundColor: cfg.bg }}>
      {showConf && <Confetti />}
      <div className="bg-white rounded-3xl shadow-lg p-7 w-full max-w-sm text-center pop">
        <div className="text-6xl mb-2">{isPerfect ? '🌟' : star}</div>
        <h2 className="text-4xl font-bold text-gray-800">{score}/{total}</h2>
        <p className={`text-lg font-semibold mt-1 ${pct >= 70 ? 'text-emerald-600' : 'text-orange-500'}`}>
          {pct}% — {msg}
        </p>
        {isPerfect && (
          <div className="mt-3 bg-yellow-100 rounded-lg p-2">
            <p className="text-sm font-bold text-yellow-800">🎉 Perfect {mode === 'quiz' ? 'Quiz' : 'Drill'}! +$2 to your wallet</p>
          </div>
        )}
        {subject === 'malay' && revealCount > 0 && (
          <div className="mt-2 bg-amber-50 border border-amber-200 rounded-lg p-2">
            <p className="text-xs text-amber-700">🇬🇧 "Reveal English" used {revealCount} time{revealCount !== 1 ? 's' : ''} during this quiz</p>
          </div>
        )}
        <p className="text-gray-400 text-xs mt-2 mb-5">Score saved automatically ✓</p>

        <div className="text-left mb-5">
          <p className="font-semibold text-gray-600 text-xs uppercase tracking-wide mb-2">Topic Breakdown</p>
          {Object.entries(breakdown || {}).map(([topic, d]) => {
            const p = Math.round((d.correct / d.total) * 100);
            const col = p >= 80 ? 'bg-emerald-500' : p >= 60 ? 'bg-amber-400' : 'bg-red-400';
            return (
              <div key={topic} className="mb-2.5">
                <div className="flex justify-between text-xs text-gray-500 mb-1">
                  <span>{topic}</span><span>{d.correct}/{d.total}</span>
                </div>
                <div className="w-full bg-gray-100 rounded-full h-2">
                  <div className={`${col} h-2 rounded-full transition-all`} style={{ width:`${p}%` }} />
                </div>
              </div>
            );
          })}
        </div>

        <div className="flex gap-3">
          <button onClick={onRetry} className={`flex-1 ${cfg.btn} text-white font-semibold py-3 rounded-xl`}>Try Again</button>
          <button onClick={onHome} className="flex-1 bg-gray-100 hover:bg-gray-200 text-gray-700 font-semibold py-3 rounded-xl">Home</button>
        </div>
      </div>
    </div>
  );
}

    <div className="min-h-screen bg-gradient-to-br from-purple-100 to-pink-100 pb-8">
      <div className="bg-purple-600 text-white p-6 flex items-center justify-between">
        <div className="flex items-center gap-3">
          <button onClick={onBack} className="text-white/70 hover:text-white text-xl">←</button>
          <h1 className="text-2xl font-bold">My Progress</h1>
        </div>
      </div>

      <div className="max-w-lg mx-auto p-6 space-y-6">
        <div className="bg-white rounded-2xl p-6 shadow-md text-center">
          <div className="text-5xl mb-2">💰</div>
          <h2 className="text-3xl font-bold text-gray-800">${wallet.earned}</h2>
          <p className="text-sm text-gray-500 mt-1">Earned from perfect scores (quiz &amp; drill)</p>
        </div>

        {subjects.map(key => {
          const cfg = CFG[key];
          const st = subjectStats(key);
          if (!st) return (
            <div key={key} className="bg-white rounded-2xl p-5 shadow-md">
              <div className="flex items-center gap-2 mb-2">
                <span className="text-2xl">{cfg.emoji}</span>

              </div>
              <p className="text-sm text-gray-400 italic">Not started yet</p>

          );

          return (
            <div key={key} className="bg-white rounded-2xl p-5 shadow-md">
              <div className="flex items-center gap-2 mb-4">
                <span className="text-2xl">{cfg.emoji}</span>
                <h3 className="text-lg font-bold text-gray-800">{cfg.label}</h3>
                <span className="ml-auto text-xs text-gray-400">{st.count} session{st.count !== 1 ? 's' : ''}</span>
              </div>

              <div className="grid grid-cols-2 gap-3 mb-4">
                <div className="bg-blue-50 rounded-xl p-3 text-center">
                  <div className="text-xl font-bold text-blue-600">{st.quizAvg !== null ? `${st.quizAvg}%` : '—'}</div>
                  <div className="text-xs text-gray-500 mt-0.5">📝 Quiz Score</div>
                </div>
                <div className="bg-purple-50 rounded-xl p-3 text-center">
                  <div className="text-xl font-bold text-purple-600">{st.drillAvg !== null ? `${st.drillAvg}%` : '—'}</div>
                  <div className="text-xs text-gray-500 mt-0.5">⚡ Drill Score</div>
                </div>
              </div>

              <div className="grid grid-cols-2 gap-3 mb-3">
                <div className="bg-green-50 rounded-xl p-3 text-center">
                  <div className="text-xl font-bold text-green-600">{st.best}%</div>
                  <div className="text-xs text-gray-500 mt-0.5">🏆 Best</div>
                </div>
                <div className="bg-yellow-50 rounded-xl p-3 text-center">
                  <div className="text-xl font-bold text-yellow-600">{st.perfectDrills}</div>
                  <div className="text-xs text-gray-500 mt-0.5">⭐ Perfect Drills</div>
                </div>
              </div>

              {st.drillAttemptData && (
                <div className="bg-orange-50 rounded-xl p-3 text-sm text-orange-800 border border-orange-100">
                  <span className="font-semibold">Drill attempts before perfection: </span>
                  {st.drillAttemptData.topicsAchieved > 0
                    ? `${st.drillAttemptData.totalAttempts} total drill runs to perfect ${st.drillAttemptData.topicsAchieved}/${st.drillAttemptData.topicsTotal} topic${st.drillAttemptData.topicsTotal !== 1 ? 's' : ''}`
                    : `${st.drillAttemptData.totalAttempts} drill run${st.drillAttemptData.totalAttempts !== 1 ? 's' : ''} — keep going!`}
                </div>
              )}

              {st.perfectDrills > 0 && (
                <div className="flex flex-wrap gap-1 mt-3">
                  {Array(st.perfectDrills).fill(0).map((_, i) => (
                    <span key={i} className="text-base">⭐</span>
                  ))}

              )}
            </div>
          );
        })}

}

// SCREEN: PARENT DASHBOARD
// ═══════════════════════════════════════════════════════════════
function CloudSyncPanel() {
  const [fbInput, setFbInput] = React.useState(getFirebaseUrl() || 'https://reyhana-quiz-default-rtdb.asia-southeast1.firebasedatabase.app');
  const [syncing, setSyncing] = React.useState(false);
  const [syncMsg, setSyncMsg] = React.useState('');

  function doSave() {
    localStorage.setItem(RC_PREFIX + 'firebase_url', fbInput.trim());
    setSyncMsg('Saving…');
    syncToFirebase().then(() => {
      setSyncMsg('Saved & uploaded!');
    });
  }

  function doRefresh() {
    setSyncing(true); setSyncMsg('');
    loadFromFirebase().then(ok => {
      setSyncing(false);
      setSyncMsg(ok ? 'Data refreshed! Changes are live.' : 'Could not load — check URL or Firebase rules.');
    });
  }

  // Auto-save URL if default is being used
  React.useEffect(() => {
    if (!getFirebaseUrl()) {
      localStorage.setItem(RC_PREFIX + 'firebase_url', 'https://reyhana-quiz-default-rtdb.asia-southeast1.firebasedatabase.app');
    }
  }, []);

  return (
    <div>
      <input
        value={fbInput}
        onChange={e => setFbInput(e.target.value)}
        placeholder="https://your-project-default-rtdb.firebaseio.com"
        className="w-full border-2 border-gray-200 rounded-xl p-2 text-xs mb-2 focus:outline-none focus:border-violet-400"
      />
      <div className="flex gap-2">
        <button onClick={doSave} className="flex-1 bg-violet-500 hover:bg-violet-600 text-white text-xs font-bold py-2 rounded-xl">
          Save & Upload
        </button>
        <button onClick={doRefresh} disabled={syncing} className="flex-1 bg-blue-500 hover:bg-blue-600 text-white text-xs font-bold py-2 rounded-xl disabled:opacity-50">
          {syncing ? 'Loading…' : '↻ Restore from Cloud'}
        </button>
      </div>
      {syncMsg && <p className="text-xs mt-2 text-center text-gray-500">{syncMsg}</p>}
    </div>
  );
}

function ParentDashboard({ onBack }) {
  const [pin, setPin] = useState('');
  const [open, setOpen] = useState(false);
  const [err, setErr] = useState('');
  const [resetDone, setResetDone] = useState(false);

  function doReset() {
    Object.keys(localStorage)
      .filter(k => k.startsWith('af1_seen_'))
      .forEach(k => localStorage.removeItem(k));
    setResetDone(true);
    setTimeout(() => setResetDone(false), 3000);
  }

  function tryPin() {
    if (pin === PARENT_PIN) { setOpen(true); setErr(''); }
    else setErr('Incorrect PIN. Try again.');
  }

  if (!open) return (
    <div className="min-h-screen bg-gray-50 flex flex-col items-center justify-center p-6">
      <button onClick={onBack} className="self-start text-gray-400 hover:text-gray-600 mb-6 text-sm">← Back</button>
      <div className="bg-white rounded-2xl shadow p-8 w-full max-w-xs text-center">
        <div className="text-4xl mb-3">🔒</div>
        <h2 className="text-xl font-bold text-gray-700 mb-4">Parent Dashboard</h2>
        <input type="password" placeholder="Enter PIN"
          value={pin} onChange={e => setPin(e.target.value)}
          onKeyDown={e => e.key === 'Enter' && tryPin()}
          className="w-full border-2 border-gray-200 rounded-xl p-3 text-center text-xl mb-3 focus:outline-none focus:border-violet-400 tracking-widest" />
        {err && <p className="text-red-500 text-sm mb-2">{err}</p>}
        <button onClick={tryPin} className="w-full bg-violet-500 hover:bg-violet-600 text-white font-bold py-3 rounded-xl">Unlock</button>
        <p className="text-gray-400 text-xs mt-3">Default PIN: 1234</p>
      </div>
    </div>
  );

  const wallet = getWallet();
  const all = getResults();

  return (
    <div className="min-h-screen bg-gray-50 pb-12">
      <div className="bg-violet-600 text-white p-5 flex items-center justify-between">
        <div className="flex items-center gap-3">
          <button onClick={onBack} className="text-white/70 hover:text-white text-xl">←</button>
          <h1 className="text-lg font-bold">Dashboard</h1>
        </div>
      </div>

      <div className="max-w-lg mx-auto p-6 space-y-6">
        <div className="grid grid-cols-2 gap-4">
          <div className="bg-white rounded-2xl p-4 shadow text-center">
            <div className="text-3xl">💰</div>
            <div className="text-2xl font-bold text-violet-600">${wallet.earned}</div>
            <div className="text-xs text-gray-500">Earned</div>
          </div>
          <div className="bg-white rounded-2xl p-4 shadow text-center">
            <div className="text-3xl">✅</div>
            <div className="text-2xl font-bold text-emerald-600">{all.length}</div>
            <div className="text-xs text-gray-500">Sessions</div>
          </div>
        </div>

        {Object.entries(CFG).map(([key, cfg]) => {
          if (key === 'gepmath') return null;
          const st = subjectStats(key);
          if (!st) return null;
          return (
            <div key={key} className="bg-white rounded-2xl p-5 shadow">
              <h3 className="text-lg font-bold text-gray-800 mb-3">{cfg.emoji} {cfg.label}</h3>
              <div className="space-y-2 text-sm">
                <p><strong>Average:</strong> {st.avg}%</p>
                <p><strong>Best:</strong> {st.best}%</p>
                <p><strong>Sessions:</strong> {st.count}</p>
                <p><strong>Perfect Drills:</strong> {st.perfectDrills}</p>
              </div>
            </div>
          );
        })}

        <div className="bg-white rounded-2xl p-5 shadow">
          <h3 className="text-lg font-bold text-gray-800 mb-3">Recent Sessions</h3>
          <div className="space-y-2">
            {all.slice().reverse().map((r, i) => (
              <div key={i} className="flex justify-between text-sm py-2 border-b last:border-0">
                <span className="text-gray-600">{r.date} — {r.subject}</span>
                <span style={{background:'#eee',borderRadius:'4px',padding:'2px 6px',fontSize:'0.75em',textTransform:'capitalize'}}>{r.difficulty || '—'}</span>
                <span className={`font-bold ${r.pct >= 70 ? 'text-emerald-600' : 'text-red-500'}`}>{r.pct}%</span>
              </div>
            ))}
          </div>
        </div>

        <div className="bg-white rounded-2xl p-5 shadow border border-orange-100">
          <h3 className="text-lg font-bold text-gray-800 mb-1">🔄 Reset Question Rotation</h3>
          <p className="text-xs text-gray-500 mb-3">Clears only the seen-question tracker so quizzes feel fresh again. Wallet, rewards and quiz history are <strong>not</strong> affected.</p>
          {resetDone
            ? <p className="text-emerald-600 font-bold text-sm">✅ Done! Questions will rotate fresh next quiz.</p>
            : <button onClick={doReset} className="w-full bg-orange-400 hover:bg-orange-500 text-white font-bold py-2 rounded-xl text-sm">Reset Question Rotation</button>
          }

        <div className="bg-white rounded-2xl p-5 shadow border border-blue-100">
          <h3 className="text-base font-bold text-gray-700 mb-2">☁️ Cloud Sync</h3>
          <p className="text-xs text-gray-400 mb-3">Paste your Firebase Realtime Database URL to sync progress across devices.</p>
          <CloudSyncPanel />
        </div>
        </div>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════
// APP ROOT
// ═══════════════════════════════════════════════════════════════
function App() {
  const [screen, setScreen] = useState('home');
  const [subject, setSubj] = useState(null);
  const [mode, setMode] = useState(null);
  const [topic, setTopic] = useState(null);
  const [result, setResult] = useState(null);
  const [difficulty, setDiff] = useState('easy');

  React.useEffect(() => {
    const DEFAULT_URL = 'https://reyhana-quiz-default-rtdb.asia-southeast1.firebasedatabase.app';
    if (!localStorage.getItem(RC_PREFIX + 'firebase_url')) {
      localStorage.setItem(RC_PREFIX + 'firebase_url', DEFAULT_URL);
    }
    loadFromFirebase();
  }, []);

  function onSubjectSelect(s) {
    setSubj(s);
    setScreen('subject-select');
  }

  function onMode(m, diff = 'easy') {
    setDiff(diff);
    if (m === 'drill') {
      setMode('drill');
      setScreen('select-topic');
    } else {
      setMode('quiz');
      setScreen('quiz');
    }
  }

  function onSelectTopic(t) {
    setTopic(t);
    setScreen('drill');
  }

  function onDone(score, total, breakdown, revealCount = 0) {
    setResult({ score, total, breakdown, revealCount, difficulty });
    setScreen('result');
  }

  function onDrillPerfect() {
    setResult({ score: 10, total: 10, breakdown: { [topic]: { correct: 10, total: 10 } } });
    setScreen('result');
  }

  return (
    <>
      {screen === 'home' && <HomeScreen onSelect={onSubjectSelect} onProgress={() => setScreen('progress')} onParent={() => setScreen('parent')} />}
      {screen === 'subject-select' && (
        <SubjectSelectScreen subject={subject} onMode={onMode} onBack={() => setScreen('home')} />
      )}
      {screen === 'select-topic' && (
        <TopicSelectScreen subject={subject} onSelect={onSelectTopic} onBack={() => setScreen('subject-select')} />
      )}
      {screen === 'quiz' && <QuizScreen subject={subject} onDone={onDone} onBack={() => setScreen('home')} difficulty={difficulty} />}
      {screen === 'drill' && <DrillScreen subject={subject} topic={topic} onDone={onDrillPerfect} onBack={() => setScreen('select-topic')} onHome={() => setScreen('home')} />}
      {screen === 'result' && result && (
        <ResultsScreen
          subject={subject}
          score={result.score}
          total={result.total}
          breakdown={result.breakdown}
          mode={mode}
          revealCount={result.revealCount || 0}
          difficulty={result.difficulty}
          onHome={() => setScreen('home')}
          onRetry={() => {
            if (mode === 'drill') setScreen('select-topic');
            else setScreen('subject-select');
          }}
        />
      )}
      {screen === 'progress' && <ProgressScreen onBack={() => setScreen('home')} />}
      {screen === 'parent' && <ParentDashboard onBack={() => setScreen('home')} />}
    </>
  );
}

function TopicSelectScreen({ subject, onSelect, onBack }) {
  const cfg = CFG[subject];
  const topics = {
    english: ['Grammar MCQ', 'Vocabulary', 'Visual Text', 'Grammar Cloze', 'Editing', 'Comprehension'],
    math: ['Section A: MCQ', 'Section B: Short Answer', 'Section C: Word Problems'],
    science: ['Diversity of Living Things', 'Materials', 'Magnets', 'Life Cycles', 'Mixed Review'],
    malay: ['Perbendaharaan Kata', 'Tatabahasa', 'Pemahaman', 'Isi Tempat Kosong'],
    gepmath: ['Number Patterns', 'Clever Problem Sums', 'Logic & Spatial', 'Mental Maths', 'Fractions & Measurement'],
  }[subject] || [];

  return (
    <div className="min-h-screen flex flex-col" style={{ backgroundColor: cfg.bg }}>
      <div className="p-5 flex items-center gap-3" style={{ backgroundColor: cfg.hdr, color: 'white' }}>
        <button onClick={onBack} className="text-white/70 hover:text-white text-xl">←</button>
        <h1 className="text-xl font-bold">Choose Topic — Drill Mode</h1>
      </div>

      <div className="flex-1 p-6 max-w-lg mx-auto w-full space-y-3">
        {topics.map(t => (
          <button key={t} onClick={() => onSelect(t)}
            className="w-full bg-white rounded-2xl p-4 shadow hover:shadow-md transition-all text-left font-semibold text-gray-800 hover:scale-105 active:scale-95"
            style={{ borderLeft: `4px solid ${cfg.hdr}` }}>
            {t}
          </button>
        ))}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
